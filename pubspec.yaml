name: devdesk
description: A pure Flutter developer toolbox offline-first application.
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_markdown_plus: ^1.0.12
  flutter_riverpod: ^2.3.2
  http: ^1.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.6.0
  diff_match_patch: ^0.4.1
  file_picker: ^11.0.2
  archive: ^4.0.9
  path: ^1.8.3
  yaml: ^3.1.3
  xml: ^6.6.1
  package_info_plus: ^9.0.1
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.21.0
  mockito: ^5.4.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "assets/DEVDESK.png"
    background_color: "#0B0F14"
    theme_color: "#2563EB"
  windows:
    generate: true
    image_path: "assets/DEVDESK.png"
    icon_size: 256
  image_path: "assets/DEVDESK.png"
  adaptive_icon_background: "#0B0F14"
  adaptive_icon_foreground: "assets/DEVDESK.png"

flutter_native_splash:
  color: "#0B0F14"
  image: assets/DEVDESK.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/DEVDESK.png
    color: "#0B0F14"
    icon_background_color: "#0B0F14"

flutter:
  uses-material-design: true
