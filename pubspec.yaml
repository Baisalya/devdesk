name: devdesk
description: A pure Flutter developer toolbox offline-first application.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_markdown: ^0.6.13
  flutter_riverpod: ^2.3.2
  http: ^0.13.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^3.0.6
  diff_match_patch: ^0.4.1
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.21.0
  mockito: ^5.4.0

flutter:
  uses-material-design: true
